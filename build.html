<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Build</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="topnav">
  <div class="nav-links">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="build.html" class="nav-btn active">Build</a>
  </div>
</div>

<div class="main">

  <div class="sec-hdr h-build">
    <div class="sec-title">Build</div>
    <div class="sec-sub">Define and structure your strategy clearly</div>
  </div>

  <!-- STEP NAV -->
  <div class="step-nav2">
    <button class="step-btn2 active">WHAT</button>
    <button class="step-btn2">WHY</button>
    <button class="step-btn2">HOW</button>
    <button class="step-btn2">WHEN</button>
  </div>

  <!-- CONTENT -->
  <div class="info-box">
    <div class="info-title">Strategy Input</div>
    <div class="info-sub">
      Capture the core elements of your strategy. This becomes the source for execution.
    </div>
  </div>

  <div class="fld-lbl">WHAT — Scope & Domain</div>
  <textarea placeholder="What exactly are you doing? What are you deliberately NOT doing?"></textarea>

  <div class="fld-lbl">WHY — Strategic Intent</div>
  <textarea placeholder="Why does this strategy exist? What is the differentiating logic?"></textarea>

  <div class="fld-lbl">HOW — Operating Model</div>
  <textarea placeholder="How will you deliver it? Capabilities, processes, partnerships."></textarea>

  <div class="fld-lbl">WHEN — Sequencing</div>
  <textarea placeholder="What happens in what order? Phases, milestones, timing."></textarea>

  <div class="btn-row">
    <button class="btn-p">Save</button>
    <button class="btn-s">Reset</button>
  </div>

</div>

</body>
